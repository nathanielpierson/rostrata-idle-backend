spring.application.name=rostrata-idle-backend
server.port=8080

# --- Postgres database (default) ---
# If you see: FATAL: role "rostrata" does not exist — create the role and DB, e.g.:
#   psql -d postgres -c "CREATE USER rostrata WITH PASSWORD 'rostrata';"
#   psql -d postgres -c "CREATE DATABASE rostrata OWNER rostrata;"
# Or run without Postgres: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# Override via environment variables if needed:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rostrata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rostrata}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rostrata}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Run schema.sql on startup so existing databases get safe column upgrades.
spring.sql.init.mode=always
