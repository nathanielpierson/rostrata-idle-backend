# Local development without PostgreSQL.
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# schema.sql is written for Postgres (ALTER ... TYPE TEXT, etc.). With H2 we rely on
# Hibernate ddl-auto=update to create tables; do not run that script here.
spring.sql.init.mode=never

spring.datasource.url=jdbc:h2:mem:rostrata-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
